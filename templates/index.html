 <!DOCTYPE html>
<html>
<head>
    <title>UPI Fraud Detection</title>

    <!-- 🎨 MODERN GRADIENT NAVY UI -->
    <style>
        body {
            /* 🌈 GRADIENT BACKGROUND ADDED HERE */
            background: linear-gradient(135deg, #0b1f3a, #142850);

            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            min-height: 100vh;
        }

        h2, label {
            color: white;
        }

        input {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: none;
            width: 220px;
        }

        button {
            background-color: #1e90ff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }

        button:hover {
            background-color: #0d6efd;
        }

        form {
            margin-top: 20px;
        }

        a {
            text-decoration: none;
        }

        /* optional card effect */
        form {
            background: rgba(255, 255, 255, 0.08);
            display: inline-block;
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(6px);
        }

    </style>
</head>

<body>

    <h2>UPI Fraud Detection</h2>

    <!-- 🚀 FORM -->
    <form action="/predict" method="get">

        <label>Enter Amount</label><br>
        <input type="number" name="amount" required><br><br>

        <label>Hour (0-23)</label><br>
        <input type="number" name="hour" min="0" max="23" required><br><br>

        <label>Velocity</label><br>
        <input type="number" step="0.1" name="velocity" required><br><br>

        <label>Existing User (0 or 1)</label><br>
        <input type="number" name="new_user" min="0" max="1" required><br><br>

        <label>Location (City)</label><br>
        <input type="text" name="location" placeholder="Hyderabad, Bangalore..." required><br><br>

        <button type="submit">🚀 Predict</button>

    </form>

    <br>

    <!-- 📊 Buttons -->
    <a href="/dashboard">
        <button>📊 View Dashboard</button>
    </a>

    <a href="/heatmap">
        <button>🌍 View Fraud Heatmap</button>
    </a>

</body>
</html>
